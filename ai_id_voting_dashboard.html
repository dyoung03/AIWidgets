let activePhase = 'all';
const phases = ['Decide', 'Define', 'Design', 'Develop', 'Deploy'];

function getScoreClass(s) {
  if (s >= 7) return 'score-strong-yes';
  if (s >= 3) return 'score-mild-yes';
  if (s > -3) return 'score-neutral';
  if (s > -7) return 'score-mild-no';
  return 'score-strong-no';
}

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderPhaseCards() {
  const container = document.getElementById('phase-cards');
  container.innerHTML = '';
  phases.forEach(phase => {
    const phaseItems = items.filter(i => i.p === phase);
    const avg = phaseItems.reduce((sum, i) => sum + i.s, 0) / phaseItems.length;
    const card = document.createElement('div');
    card.className = 'phase-card' + (activePhase === phase ? ' active' : '');
    card.innerHTML = '<div class="phase-name">' + phase + '</div>' +
      '<div class="phase-stat">' + avg.toFixed(1) + '</div>' +
      '<div class="phase-meta">' + phaseItems.length + ' ideas</div>';
    card.addEventListener('click', () => {
      activePhase = activePhase === phase ? 'all' : phase;
      renderPhaseCards();
      renderItems();
    });
    container.appendChild(card);
  });
}

function renderItems() {
  const sortVal = document.getElementById('sort-sel').value;
  const searchVal = document.getElementById('search-in').value.toLowerCase();
  
  let filtered = items.filter(i => 
    (activePhase === 'all' || i.p === activePhase) &&
    (searchVal === '' || i.t.toLowerCase().includes(searchVal))
  );
  
  if (sortVal === 'fav-desc') filtered.sort((a, b) => b.s - a.s);
  else if (sortVal === 'fav-asc') filtered.sort((a, b) => a.s - b.s);
  else if (sortVal === 'contested') filtered.sort((a, b) => {
    const ca = a.x + (Math.min(a.u, a.d) * 2);
    const cb = b.x + (Math.min(b.u, b.d) * 2);
    return cb - ca;
  });
  else if (sortVal === 'phase') {
    filtered.sort((a, b) => {
      const pa = phases.indexOf(a.p);
      const pb = phases.indexOf(b.p);
      if (pa !== pb) return pa - pb;
      return b.s - a.s;
    });
  }
  
  document.getElementById('item-count').textContent = filtered.length + ' of ' + items.length + ' ideas';
  
  const list = document.getElementById('item-list');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">No ideas match your filters.</div>';
    return;
  }
  
  list.innerHTML = filtered.map(item => {
    const total = item.u + item.d + item.x;
    const upPct = total > 0 ? (item.u / total) * 100 : 0;
    const downPct = total > 0 ? (item.d / total) * 100 : 0;
    const depPct = total > 0 ? (item.x / total) * 100 : 0;
    const scoreText = (item.s >= 0 ? '+' : '') + item.s.toFixed(1);
    const pillClass = 'pill-' + item.p.toLowerCase();
    
    return '<div class="item">' +
      '<div class="item-header">' +
        '<div class="phase-pill ' + pillClass + '">' + item.p + '</div>' +
        '<div class="item-text">' + escapeHtml(item.t) + '</div>' +
        '<div class="score-chip ' + getScoreClass(item.s) + '">' + scoreText + '</div>' +
      '</div>' +
      '<div class="vote-row">' +
        '<div class="vote-bar">' +
          '<div class="vote-segment vote-up" style="width: ' + upPct + '%"></div>' +
          '<div class="vote-segment vote-down" style="width: ' + downPct + '%"></div>' +
          '<div class="vote-segment vote-depends" style="width: ' + depPct + '%"></div>' +
        '</div>' +
        '<div class="vote-counts">' +
          '<span><span class="dot dot-up"></span>' + item.u + '</span>' +
          '<span><span class="dot dot-down"></span>' + item.d + '</span>' +
          '<span><span class="dot dot-depends"></span>' + item.x + '</span>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

document.getElementById('sort-sel').addEventListener('change', renderItems);
document.getElementById('search-in').addEventListener('input', renderItems);

renderPhaseCards();
renderItems();
</script>
